<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/791ffebf52.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="icon">
        <i class="fa-brands fa-neos"></i>
        <p>NGZ GAMES</p>
    </div>
    
    <h2>Tambah Game Baru</h2>
    <form id="formTambah" class="mt-4">
        <div class="mb-3">
            <label>Judul Game</label>
            <input type="text" id="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Genre</label>
            <input type="text" id="genre" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Harga (Rp)</label>
            <input type="number" id="price" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Simpan Data</button>
        <a href="index.html" class="btn btn-secondary">Batal</a>
    </form>
    
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        $('#formTambah').submit(function (e) {
            e.preventDefault(); // Mencegah form reload halaman

            // Mengambil data dari inputan
            const dataGame = {
                title: $('#title').val(),
                genre: $('#genre').val(),
                price: $('#price').val()
            };

            // Mengirim data ke server via AJAX
            $.ajax({
                url: '/api/games',
                type: 'POST',
                data: dataGame,
                success: function (response) {
                    alert('Data berhasil ditambahkan!');
                    window.location.href = 'index.html';
                },
                error: function (err) {
                    alert('Gagal menambahkan data!');
                }
            });
        });
    </script>
</body>
</html>
