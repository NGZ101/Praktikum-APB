<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/791ffebf52.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="icon">
        <i class="fa-brands fa-neos"></i>
        <p>NGZ GAMES</p>
    </div>
    
    <h2>Edit Data Game</h2>
    <form id="formEdit" class="mt-4">
        <input type="hidden" id="id">
    
        <div class="mb-3">
            <label>Judul Game</label>
            <input type="text" id="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Genre</label>
            <input type="text" id="genre" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Harga (Rp)</label>
            <input type="number" id="price" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Data</button>
        <a href="index.html" class="btn btn-secondary">Batal</a>
    </form>
    
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        $(document).ready(function () {
            // 1. Mengambil parameter ID dari URL (contoh: edit.html?id=1)
            const urlParams = new URLSearchParams(window.location.search);
            const idGame = urlParams.get('id');

            // 2. Mengambil data lama dari database dan memunculkannya di form
            $.get(`/api/games/${idGame}`, function (data) {
                $('#id').val(data.id);
                $('#title').val(data.title);
                $('#genre').val(data.genre);
                $('#price').val(data.price);
            });

            // 3. Mengirim data yang sudah diedit ke server
            $('#formEdit').submit(function (e) {
                e.preventDefault();

                const dataUpdate = {
                    title: $('#title').val(),
                    genre: $('#genre').val(),
                    price: $('#price').val()
                };

                $.ajax({
                    url: `/api/games/${$('#id').val()}`,
                    type: 'PUT',
                    data: dataUpdate,
                    success: function (response) {
                        alert('Data berhasil diupdate!');
                        window.location.href = 'index.html';
                    }
                });
            });
        });
    </script>
</body>
</html>
