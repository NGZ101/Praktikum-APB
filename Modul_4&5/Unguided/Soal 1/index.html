<!DOCTYPE html>
<html lang="id">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Praktikan</title>
</head>

<body>
    <center>
        <h2>Data Mahasiswa</h2>
        <form action="#" method="POST">
            <table>
                <tr>
                    <td><label for="name"><b>Nama</b></label></td>
                    <td>:</td>
                    <td><input type="text" placeholder="Input Nama" name="Nama_input" id="Nama_id" placeholder=""textarea></td>
                </tr>
                <tr>
                    <td><label for="Nim"><b>NIM</b></label></td>
                    <td>:</td>
                    <td><input type="text" placeholder="Input NIM" name="NIM_input" id="NIM_id" placeholder=""textarea></td>
                </tr>
                <tr>
                    <td><label for="username"><b>Username</b></label></td>
                    <td>:</td>
                    <td><input type="text" placeholder="Input Username" name="Username_input" id="Username_id" placeholder=""textarea></td>
                </tr>
                <tr>
                    <td><label for="Password"><b>Password</b></label></td>
                    <td>:</td>
                    <td><input type="password" placeholder="Input Password" name="Password_input" id="Password_id" placeholder=""textarea></td>
                </tr>
                <tr>
                    <td><label for="Email"><b>Email</b></label></td>
                    <td>:</td>
                    <td><input type="text" placeholder="Input Email" name="Email_input" id="Email_id" placeholder=""textarea></td>
                </tr>
                <tr>
                    <td><b>Jenis Kelamin</b></td>
                    <td>:</td>
                    <td>
                        <input type="radio" name="jk_input" id="pria" value="Pria">
                        <label for="pria">Pria</label>
                        <input type="radio" name="jk_input" id="wanita" value="Wanita">
                        <label for="wanita">Wanita</label>
                    </td>
                </tr>
                <tr>
                    <td><b>Hobi</b></td>
                    <td>:</td>
                    <td>
                        <input type="checkbox" name="hobi_input" id="Renang" value="Renang">
                        <label for="Renang">Renang</label><br>
                        <input type="checkbox" name="hobi_input" id="Bersepeda" value="Bersepeda">
                        <label for="Bersepeda">Bersepeda</label><br>
                        <input type="checkbox" name="hobi_input" id="Memancing" value="Memancing">
                        <label for="Memancing">Memancing</label><br>
                    </td>
                </tr>
                <tr>
                    <td><label for="pendidikan"><b>Jenjang Pendidikan</b></label></td>
                    <td>:</td>
                    <td>
                        <select name="pendidikan_input" id="pendidikan_id">
                            <option value="" selected>------Pilih------</option>
                            <option value="D3">Tamat D3</option>
                            <option value="S1">Tamat S1</option>
                            <option value="S2">Tamat S2</option>
                            <option value="S3">Tamat S3</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label for="kritik_saran"><b>Kritik & Saran</b></label></td>
                    <td>:</td>
                    <td><textarea id="kritik_saran" name="kritik_saran" rows="5" cols="30"></textarea></td>
                </tr>
                <tr>
                    <td colspan="3" align="right">
                        <input type="button" value="Submit" class="btn-Submit">
                        <input type="submit" value="Reset" class="btn-Reset">
                    </td>
                </tr>
            </table>
        </form>
    </center>
</body>

</html
