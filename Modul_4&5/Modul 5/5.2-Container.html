<!DOCTYPE html>
<html>
<head>
<title>Container Example</title>
<link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

<!-- Container Fluid (Full Width) -->
<div class="container-fluid">
    <h2>Container Fluid</h2>
    <p>Container ini memiliki lebar penuh mengikuti seluruh layar.</p>
</div>

<!-- Container (Fixed Width) -->
<div class="container">
    <h2>Container</h2>
    <p>Container ini memiliki lebar tetap dan berada di tengah halaman.</p>
</div>

</body>
</html>
